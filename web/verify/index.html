<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Credential — Tathmfy</title>
<meta name="description" content="Lenders verify a Tathmfy signed credit credential — score, factor grades, and verified identity fields. Never raw transactions.">
<link rel="canonical" href="https://tathmfy.com/verify">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<style>
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;color:#271C16;-webkit-font-smoothing:antialiased;
  font-family:'DM Sans',sans-serif;
  background:
    radial-gradient(1200px 520px at 10% -10%, rgba(200,85,58,.14), transparent 55%),
    radial-gradient(900px 480px at 100% 0%, rgba(28,110,96,.10), transparent 50%),
    #F3ECE0;
}
a{color:#C8553A;text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:600px;margin:0 auto;padding:36px 22px 72px}
.back{display:inline-flex;align-items:center;gap:6px;font:600 13px 'DM Sans';color:#9A8C7E;margin-bottom:22px}
.back:hover{color:#271C16;text-decoration:none}
.hero-eye{font:700 11px 'JetBrains Mono';color:#C8553A;letter-spacing:.12em;text-transform:uppercase;margin:0 0 10px}
h1{font:800 32px/1.1 'Bricolage Grotesque';margin:0 0 10px;letter-spacing:-.03em}
.lead{font:500 15px/1.55 'DM Sans';color:#6B5E52;margin:0 0 26px}
.card{
  background:rgba(255,255,255,.92);
  border:1px solid #E4DBCD;
  border-radius:20px;
  padding:22px;
  box-shadow:0 18px 40px rgba(39,28,22,.08);
  backdrop-filter:blur(8px);
}
label{display:block;font:600 12px 'DM Sans';color:#9A8C7E;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.input-row{display:flex;gap:10px}
input{
  flex:1;font:600 16px 'JetBrains Mono';letter-spacing:.06em;padding:14px 16px;
  border:1.5px solid #E4DBCD;border-radius:12px;background:#FAF7F2;color:#271C16;
  outline:none;text-transform:uppercase;
}
input:focus{border-color:#C8553A;box-shadow:0 0 0 4px rgba(200,85,58,.12)}
button.primary{
  font:700 15px 'DM Sans';padding:14px 20px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#C8553A,#B34832);color:#fff;cursor:pointer;white-space:nowrap;
  box-shadow:0 10px 20px rgba(200,85,58,.25);
}
button.primary:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
button.primary:hover:not(:disabled){filter:brightness(.97)}
.result{margin-top:18px;display:none}
.result.show{display:block}
.panel{border-radius:16px;padding:22px;margin-bottom:0}
.panel.valid{
  background:linear-gradient(160deg,#F4FBF8 0%,#EEF6F2 45%,#F8F3EA 100%);
  border:1px solid #C9E4DC;
  animation:rise .45s ease;
}
.panel.invalid{background:#FFF5F2;border:1px solid #E8C4B8}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.score-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.panel h2{font:800 34px/1 'Bricolage Grotesque';margin:0;letter-spacing:-.03em}
.tier{
  display:inline-block;font:700 11px 'JetBrains Mono';padding:5px 11px;border-radius:999px;
  background:#1C6E60;color:#fff;vertical-align:middle;
}
.badge{
  display:inline-flex;align-items:center;gap:6px;font:600 12px 'DM Sans';color:#1C6E60;
  margin-top:10px;background:rgba(28,110,96,.12);padding:6px 11px;border-radius:999px;
}
.section-title{font:700 11px 'DM Sans';color:#9A8C7E;text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px}
.meta{font:500 14px 'DM Sans';color:#6B5E52;line-height:1.65}
.meta strong{color:#271C16}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chip{background:#fff;border:1px solid #E4DBCD;border-radius:12px;padding:11px 12px}
.chip .k{font:600 10px 'DM Sans';color:#9A8C7E;text-transform:uppercase;letter-spacing:.06em}
.chip .v{font:700 14px 'DM Sans';color:#271C16;margin-top:4px}
.factor{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #EDE5D8}
.factor:last-child{border-bottom:none}
.factor .name{font:600 13px 'DM Sans';color:#271C16}
.factor .status{font:700 11px 'JetBrains Mono';padding:4px 8px;border-radius:999px}
.status-strong,.status-good{background:#E4EFEA;color:#1C6E60}
.status-building,.status-activating{background:#F6EDE0;color:#B8782E}
.identity{
  display:grid;gap:10px;margin-top:4px;
}
.identity-item{
  display:grid;grid-template-columns:20px 1fr;gap:10px;align-items:start;
  background:#fff;border:1px solid #E4DBCD;border-radius:12px;padding:12px 14px;
}
.identity-item .check{
  width:18px;height:18px;border-radius:50%;display:grid;place-items:center;
  background:#2F6BFF;color:#fff;font:700 11px 'DM Sans';margin-top:2px;
  box-shadow:0 4px 10px rgba(47,107,255,.28);
}
.identity-item .check.empty{
  background:transparent;border:1.5px solid #D5CBBC;box-shadow:none;color:transparent;
}
.identity-item .label{
  font:600 10px 'DM Sans';color:#9A8C7E;text-transform:uppercase;letter-spacing:.07em;margin:0 0 3px;
}
.identity-item .value{
  font:700 14px/1.35 'DM Sans';color:#271C16;margin:0;word-break:break-word;
}
.identity-item .hint{
  font:500 11px 'DM Sans';color:#9A8C7E;margin:4px 0 0;
}
.request-box{
  margin-top:16px;padding:14px;border-radius:14px;border:1px dashed #D9CFC0;background:#FFFBF5;
}
.request-box p{margin:0 0 12px;font:500 13px/1.5 'DM Sans';color:#6B5E52}
.request-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-width:168px;font:700 14px 'DM Sans';padding:12px 16px;border-radius:12px;border:none;
  background:#271C16;color:#F7F1E7;cursor:pointer;
  transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
}
.request-btn:hover{transform:translateY(-1px);box-shadow:0 10px 18px rgba(39,28,22,.16)}
.request-btn.done{
  background:#1C6E60;
  box-shadow:0 10px 18px rgba(28,110,96,.22);
}
.request-btn .tick{
  width:18px;height:18px;border-radius:50%;display:none;place-items:center;
  background:rgba(255,255,255,.2);font-size:12px;
}
.request-btn.done .tick{display:grid;animation:pop .35s ease}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.disclaimer{font:500 12px 'DM Sans';color:#6B5E52;line-height:1.55;margin-top:14px;padding-top:14px;border-top:1px solid rgba(39,28,22,.08)}
.err{color:#C8553A;font:600 14px 'DM Sans';margin:0}
.foot{margin-top:28px;font:500 12px 'DM Sans';color:#9A8C7E;text-align:center;line-height:1.6}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
  .input-row{flex-direction:column}
  button.primary{width:100%}
}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">&larr; tathmfy.com</a>
  <p class="hero-eye">Lender verify</p>
  <h1>Verify credential</h1>
  <p class="lead">Enter a code to see a signed score, factor grades, and verified identity — never raw transactions.</p>

  <div class="card">
    <label for="code">Verification code</label>
    <div class="input-row">
      <input id="code" type="text" placeholder="TMF-694-A7X2" autocomplete="off" spellcheck="false" maxlength="12">
      <button class="primary" id="verifyBtn" type="button">Verify</button>
    </div>
    <div id="result" class="result" aria-live="polite"></div>
  </div>

  <p class="foot">Credentials are signed on the holder&rsquo;s device.<br>Indicative signal only — not a lending decision or credit bureau pull.</p>
</div>

<script>
(function () {
  const cfg = window.TATHMFY_CONFIG || {};
  const verifyUrl = cfg.verifyUrl || '';
  const anonKey = cfg.supabaseAnonKey || '';
  const input = document.getElementById('code');
  const btn = document.getElementById('verifyBtn');
  const result = document.getElementById('result');

  // Demo identity for lender pitch (email stays unverified / no blue check).
  const DEMO_IDENTITY = {
    occupation: 'Data Engineer (Upwork)',
    nationalId: '63-2067 037 N 90',
    address: '1 Howden Close, Avondale',
    email: 'trevmacheka@gmail.com'
  };

  input.addEventListener('input', function () {
    this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
  });
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') btn.click();
  });

  btn.addEventListener('click', verify);

  async function verify() {
    const code = input.value.trim();
    if (!/^TMF-\d{3}-[A-Z0-9]{4}$/.test(code)) {
      showError('Enter a code like TMF-694-A7X2');
      return;
    }
    if (!verifyUrl || !anonKey || anonKey.startsWith('REPLACE_')) {
      showError('Verify API is not configured. Set verifyUrl and supabaseAnonKey in config.js.');
      return;
    }

    btn.disabled = true;
    result.className = 'result show';
    result.innerHTML = '<div class="panel invalid"><p class="err">Verifying…</p></div>';

    try {
      const res = await fetch(verifyUrl + '?code=' + encodeURIComponent(code), {
        headers: { Authorization: 'Bearer ' + anonKey, apikey: anonKey }
      });
      const data = await res.json();
      if (data.valid) {
        renderValid(data);
      } else {
        showError(data.error || 'Certificate not found');
      }
    } catch (e) {
      showError('Could not reach verify service. Try again.');
    } finally {
      btn.disabled = false;
    }
  }

  function renderValid(d) {
    const issued = fmtDate(d.issued_at);
    const expires = d.expires_at ? fmtDate(d.expires_at) : '—';
    const delta = d.monthly_delta != null && d.monthly_delta !== 0
      ? (d.monthly_delta > 0 ? '+' + d.monthly_delta : String(d.monthly_delta)) + ' vs last month'
      : '';

    const identity = {
      occupation: d.occupation || DEMO_IDENTITY.occupation,
      nationalId: d.national_id || DEMO_IDENTITY.nationalId,
      address: d.home_address || DEMO_IDENTITY.address,
      email: d.email || DEMO_IDENTITY.email
    };

    let html = '<div class="panel valid">';
    html += '<div class="score-row"><h2>Score ' + d.score + '</h2><span class="tier">' + escapeHtml(d.tier) + '</span></div>';
    html += '<span class="badge">&#10003; Signature verified · Live score</span>';

    html += '<p class="meta" style="margin-top:14px">';
    html += '<strong>Holder:</strong> ' + escapeHtml(d.holder_name) + checkInline(true) + '<br>';
    html += '<strong>Issued:</strong> ' + issued + '<br>';
    html += '<strong>Valid until:</strong> ' + expires + '<br>';
    html += '<strong>Code:</strong> ' + escapeHtml(d.verification_code);
    if (delta) html += '<br><strong>Trend:</strong> ' + delta;
    html += '</p>';

    html += '<div class="section-title">Borrower identity</div><div class="identity">';
    html += identityRow('Occupation', identity.occupation, true, 'Verified against shared profile');
    html += identityRow('National ID', identity.nationalId, true, 'Verified · match in branch');
    html += identityRow('Home address', identity.address, true, 'Verified · residential');
    html += identityRow('Email', identity.email, false, 'Declared by borrower — request to confirm');
    html += '</div>';

    if (d.factors && d.factors.length) {
      html += '<div class="section-title">Score factors</div>';
      d.factors.forEach(function (f) {
        const cls = 'status-' + String(f.status || 'building').toLowerCase();
        html += '<div class="factor"><span class="name">' + escapeHtml(f.label) + '</span>';
        html += '<span class="status ' + cls + '">' + escapeHtml(f.status) + '</span></div>';
      });
    }

    html += '<div class="section-title">Data quality</div><div class="grid">';
    html += chip('Verified', (d.verified_percent != null ? d.verified_percent + '%' : '—'));
    html += chip('Account age', (d.account_age_days != null ? d.account_age_days + ' days' : '—'));
    html += chip('Sources', (d.verified_source_count != null ? String(d.verified_source_count) : '—'));
    html += chip('Manual entries', (d.manual_entry_percent != null ? d.manual_entry_percent + '%' : '—'));
    html += '</div>';

    const hasOptIn = d.masked_phone || d.city || d.inflow_band_low != null;
    if (hasOptIn) {
      html += '<div class="section-title">Borrower opted in</div>';
      html += '<div class="identity">';
      if (d.masked_phone) html += identityRow('Contact', d.masked_phone, true, 'Shared with consent');
      if (d.city || d.province) {
        html += identityRow('Location', [d.city, d.province].filter(Boolean).join(', '), true, 'Shared with consent');
      }
      if (d.inflow_band_low != null && d.inflow_band_high != null) {
        let cash = '$' + d.inflow_band_low + '–$' + d.inflow_band_high + ' inflow / mo';
        if (d.net_band_low != null) cash += ' · net $' + d.net_band_low + '–$' + d.net_band_high;
        if (d.income_regularity_weeks) cash += ' · ' + d.income_regularity_weeks + ' regular weeks';
        html += identityRow('Cash-flow bands', cash, true, 'Aggregates only — no raw transactions');
      }
      html += '</div>';
    }

    html += '<div class="request-box">';
    html += '<p>Need bank statements, phone, or deeper KYC? Ask the borrower — they stay in control.</p>';
    html += '<button type="button" class="request-btn" id="requestMoreBtn">';
    html += '<span class="tick" aria-hidden="true">✓</span>';
    html += '<span class="label">Request more data</span>';
    html += '</button></div>';

    html += '<p class="disclaimer"><strong>Disclaimer:</strong> Indicative credit signal from on-device behaviour analysis. Not loan approval, a bureau report, or a repayment guarantee. Lender retains full underwriting authority.</p>';
    html += '</div>';

    result.innerHTML = html;
    result.className = 'result show';

    const requestBtn = document.getElementById('requestMoreBtn');
    if (requestBtn) {
      requestBtn.addEventListener('click', function () {
        if (requestBtn.classList.contains('done')) return;
        requestBtn.classList.add('done');
        requestBtn.querySelector('.label').textContent = 'Request sent';
      });
    }
  }

  function identityRow(label, value, verified, hint) {
    const check = verified
      ? '<span class="check" title="Verified">✓</span>'
      : '<span class="check empty" title="Not verified"></span>';
    let html = '<div class="identity-item">' + check + '<div>';
    html += '<p class="label">' + escapeHtml(label) + '</p>';
    html += '<p class="value">' + escapeHtml(value) + '</p>';
    if (hint) html += '<p class="hint">' + escapeHtml(hint) + '</p>';
    html += '</div></div>';
    return html;
  }

  function checkInline(verified) {
    return verified
      ? ' <span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#2F6BFF;color:#fff;font:700 9px DM Sans;vertical-align:1px;margin-left:4px">✓</span>'
      : '';
  }

  function chip(label, value) {
    return '<div class="chip"><div class="k">' + escapeHtml(label) + '</div><div class="v">' + escapeHtml(value) + '</div></div>';
  }

  function showError(msg) {
    result.className = 'result show';
    result.innerHTML = '<div class="panel invalid"><p class="err">' + escapeHtml(msg) + '</p></div>';
  }

  function fmtDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    } catch (e) { return iso; }
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  const params = new URLSearchParams(location.search);
  if (params.get('code')) {
    input.value = params.get('code').toUpperCase();
  }
})();
</script>
</body>
</html>
